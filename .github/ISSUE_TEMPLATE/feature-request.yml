name: Feature request
description: Suggest a change or addition to Atlas Core
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem or friction this solves
      description: Describe the situation where the current behavior falls short.
    validations:
      required: true
  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: What should Atlas do instead? Include example commands or output if it helps.
    validations:
      required: true
  - type: input
    id: agents
    attributes:
      label: Agents or tools involved
      description: e.g. Claude Code, Codex, Cursor, Copilot, Gemini CLI
    validations:
      required: false

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # Dogfood the local CLI only. Never use npx / the published package here:
      # the published doctor --fix would overwrite unreleased managed skill edits.
      - run: node bin/atlas.js doctor
